<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css" />
</head>

<body>
    <div id="map" style="height:100vh;"></div>
    <script>
        var map = L.map('map').setView([30.3753, 69.3451], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        var drawnItems = new L.FeatureGroup();
        map.addLayer(drawnItems);

        var drawControl = new L.Control.Draw({
            draw: { polygon: true, marker: true },
            edit: { featureGroup: drawnItems }
        });
        map.addControl(drawControl);

        map.on(L.Draw.Event.CREATED, function (e) {
            var layer = e.layer;
            drawnItems.addLayer(layer);

            if (e.layerType === 'polygon') {
                var coords = layer.getLatLngs();
                fetch('/zones', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: "zone", type: "industrial", polygon: JSON.stringify(coords) })
                });
            }

            if (e.layerType === 'marker') {
                var latlng = layer.getLatLng();
                fetch('/industries', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: "industry", sector: "general", lat: latlng.lat, lng: latlng.lng, status: false })
                });
            }
        });
    </script>
</body>

</html>
